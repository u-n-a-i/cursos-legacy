<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind CLI</title>
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body>
    <button
      class="bg-red-400 text-white px-4 py-2 rounded-lg m-3 hover:bg-violet-500"
    >
      Pasa el mouse
    </button>

    <br />
    <br />
    <input
      type="text"
      placeholder="Escribe aquí..."
      class="border p-3 m-3 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:outline-blue-400"
    />

    <button
      class="bg-green-400 text-white px-4 py-2 rounded-lg m-3 active:bg-yellow-400"
    >
      Presiona el botón
    </button>

    <div class="group bg-gray-300 p-5 hover:bg-gray-500 my-4">
      <p class="text-black group-hover:text-white">
        Cambiar texto al hacer hover en el contenedor
      </p>
    </div>

    <label class="block m-5">
      <input type="checkbox" class="peer hidden" />
      <span
        class="block px-4 py-2 bg-red-500 text-white rounded-lg peer-checked:bg-green-500"
        >Click para cambiar de color: rojo -> verde</span
      >
    </label>
  </body>
</html>
