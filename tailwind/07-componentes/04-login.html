<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-zinc-300 flex items-center justify-center h-screen">
    <form
      class="bg-white px-6 py-10 rounded-xl shadow-xl flex flex-col items-start gap-3 w-100"
    >
      <input
        type="text"
        class="border-b border-zinc-600 px-4 py-2 w-full outline-zinc-600 peer"
      />
      <label class="text-zinc-600">Ingresa tu nombre</label>
      <button class="mt-4 bg-zinc-700 text-zinc-100 px-4 py-2 w-full rounded-md peer-focus:bg-zinc-400">Continuar</button>
    </form>
  </body>
</html>
