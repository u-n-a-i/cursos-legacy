<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Float Label</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-zinc-300 flex items-center justify-center h-screen">
    <form
      class="bg-white px-6 py-10 rounded-xl shadow-xl flex flex-col gap-6 w-96 relative"
    >
      <div class="relative w-full">
        <input
          type="text"
          class="peer border-b border-zinc-600 w-full px-4 pt-6 pb-2 text-zinc-900 placeholder-transparent focus:outline-none focus:border-zinc-800"
          placeholder="Ingresa tu nombre"
          id="nombre"
        />
        <label
          for="nombre"
          class="absolute left-4 top-2 text-zinc-600 text-sm transition-all peer-placeholder-shown:top-6 peer-placeholder-shown:text-base peer-placeholder-shown:text-zinc-400 peer-focus:top-2 peer-focus:text-sm peer-focus:text-zinc-600"
        >
          Ingresa tu nombre
        </label>
      </div>

      <button
        class="bg-zinc-700 text-white px-4 py-2 w-full rounded-md hover:bg-zinc-500 transition"
      >
        Continuar
      </button>
    </form>
  </body>
</html>
