<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-zinc-950 text-white flex justify-center items-center h-screen"
  >
    <form
      class="bg-zinc-950 min-w-[min(90%, 400px)] rounded-2xl px-8 py-12 border border-white hover:bg-zinc-900 hover:has-[h2]:border-yellow-200"
    >
      <h2 class="text-4xl font-bold mb-6">Sign up</h2>

      <div class="flex flex-col gap-6">
        <label class="flex flex-col gap-2">
          <span>Name</span>
          <input
            type="text"
            placeholder="Enter your name"
            class="outline-zinc-600 border-white rounded-md placeholder:bg-zinc-900 text-black p-1 focus:outline-emerald-300"
          />
        </label>
        <label class="flex flex-col gap-2">
          <span>Email</span>
          <input
            type="email"
            placeholder="Enter your name"
            class="outline-zinc-600 border-white rounded-md placeholder:bg-zinc-900 text-black p-1 focus:outline-emerald-300"
          />
        </label>
        <label class="flex flex-col gap-2">
          <span>Password</span>
          <input
            type="password"
            placeholder="Enter your name"
            class="outline-zinc-600 border-white rounded-md placeholder:bg-zinc-900 text-black p-1 focus:outline-emerald-300"
          />
        </label>

        <label>
          <input type="checkbox" class="accent-zinc-500" />
          <span>I agree with terms and conditions</span>
        </label>

        <input
          type="submit"
          value="Sign up"
          class="bg-white text-black py-4 rounded-md font-bold"
        />
      </div>
    </form>
  </body>
</html>
