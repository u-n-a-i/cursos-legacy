<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pseudoclass</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-900">
    <section class="bg-purple-100 py-20">
      <h1 class="mb-10 text-center text-pink-700 text-5xl font-extrabold">
        Pseudoclass
      </h1>

      <a
        href="#"
        class="flex gap-1 bg-pink-900 hover:bg-pink-700 text-pink-200 p-2 underline w-max mx-auto rounded-md"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="currentColor"
          viewBox="0 0 24 24"
        >
          <!--Boxicons v3.0 https://boxicons.com | License  https://docs.boxicons.com/free-->
          <path
            d="m21.55 8.17-9-6c-.34-.22-.77-.22-1.11 0l-8.99 6c-.28.19-.45.5-.45.83v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-.33-.17-.65-.45-.83M12 4.2 19.2 9 12 13.8 4.8 9zM4 20v-9.13l7.45 4.96c.17.11.36.17.55.17s.39-.06.55-.17L20 10.87V20z"
          ></path>
        </svg>

        <span class="font-semibold">Aprende Tailwind</span>
      </a>
    </section>

    <h2 class="text-2xl text-pink-200 mt-20 font-extrabold">Card Overlay</h2>
    <section class="mt-5">
      <figure class="relative">
        <img
          src="https://picsum.photos/id/74/1280/848"
          alt="Puente"
          class="w-full h-60 rounded-md object-cover"
        />

        <div
          class="absolute w-full h-full bg-black/50 hover:bg-black/90 top-0 flex justify-center items-center text-white font-bold text-2xl"
        >
          <h3 class="">El lagooo, rema!!!</h3>
        </div>
      </figure>
    </section>
  </body>
</html>
