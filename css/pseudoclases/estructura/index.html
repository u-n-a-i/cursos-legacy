<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pseudoclases estructurales</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Pseudoclases estructurales</h1>

    <h2>:is() — títulos estilizados</h2>

    <section>
      <h3>Título de sección</h3>
      <p>Texto de ejemplo</p>
    </section>

    <article>
      <h2>Artículo con imagen</h2>
      <img src="../../../img/logo.png" alt="imagen" />
      <p>Este artículo contiene una imagen.</p>
    </article>

    <div></div>
    <div>Este no está vacío</div>

    <ul>
      <li class="activo">Elemento activo</li>
      <li>Elemento inactivo</li>
      <li>Otro inactivo</li>
    </ul>
  </body>
</html>
