<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unidades</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Comparación de Unidades en CSS</h1>

    <h2>Unidades absolutas (px)</h2>
    <ul class="lista absolutas">
      <li>Elemento con 14px de fuente</li>
      <li>Margen inferior: 10px</li>
      <li>Padding: 5px</li>
    </ul>

    <h2>Unidades relativas (em)</h2>
    <ul class="lista relativas">
      <li>Elemento con 1em de fuente</li>
      <li>Margen inferior: 1em</li>
      <li>Padding: 0.5em</li>
    </ul>
  </body>
</html>
