<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Título H1</h1>
    <h2>Título H2</h2>
    <h3>Título H3</h3>

    <p>
      Este es un párrafo de ejemplo para probar el estilo aplicado con el reset
      CSS. El texto debería ajustarse según las propiedades de
      <code>text-wrap</code>.
    </p>

    <img src="../../../img/logo.png" alt="Imagen de ejemplo" />

    <video controls width="600" src="algo.webm"></video>

    <svg
      width="100"
      height="100"
      role="img"
      aria-label="Icono de ejemplo"
      xmlns="http://www.w3.org/2000/svg"
    >
      <circle
        cx="50"
        cy="50"
        r="40"
        stroke="black"
        stroke-width="4"
        fill="gray"
      />
    </svg>
  </body>
</html>
