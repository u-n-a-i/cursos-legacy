<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tipografía</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h2>::first-letter y ::first-line</h2>
    <p>
      Este párrafo tiene una letra capitular y la primera línea estilizada. Es
      ideal para probar efectos clásicos de tipografía en CSS.
    </p>

    <h2>::marker</h2>
    <ul>
      <li>Elemento con viñeta personalizada</li>
      <li>Otro más</li>
    </ul>

    <ol>
      <li>Elemento numerado personalizado</li>
      <li>Segundo elemento</li>
    </ol>
  </body>
</html>
