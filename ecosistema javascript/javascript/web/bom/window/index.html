<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Window</title>
    <style>
      button {
        display: block;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Demostración del Objeto Window</h1>
    <button onclick="abrirVentana()">Abrir Nueva Ventana</button>
    <button onclick="cerrarVentana()">
      Cerrar Esta Ventana (si se abrió por script)
    </button>
    <button onclick="redimensionarVentana()">Redimensionar Ventana</button>
    <button onclick="desplazarVentana()">Desplazar Ventana</button>
    <button onclick="mostrarAlert()">Mostrar Alerta</button>
    <button onclick="establecerTimeout()">Establecer Timeout</button>

    <script src="script.js"></script>
  </body>
</html>
