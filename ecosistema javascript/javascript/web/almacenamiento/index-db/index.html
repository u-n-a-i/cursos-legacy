<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IndexedDB</title>
    <style>
      input,
      button {
        display: block;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Demostración de IndexedDB</h1>
    <p>
      Abre la consola y la pestaña "Application" > "IndexedDB" en las
      herramientas de desarrollo para ver los cambios.
    </p>

    <label for="itemId">ID del Elemento:</label>
    <input type="number" id="itemId" value="1" min="1" />
    <label for="itemName">Nombre del Elemento:</label>
    <input type="text" id="itemName" placeholder="Ej. Lápiz" />
    <label for="itemQuantity">Cantidad:</label>
    <input type="number" id="itemQuantity" value="10" min="0" />

    <button onclick="addOrUpdateItem()">Añadir/Actualizar Elemento</button>
    <button onclick="getItem()">Obtener Elemento por ID</button>
    <button onclick="getAllItems()">Obtener Todos los Elementos</button>
    <button onclick="deleteItem()">Eliminar Elemento por ID</button>
    <button onclick="clearStore()">Vaciar Almacén</button>
    <button onclick="deleteDatabase()">Eliminar Base de Datos</button>

    <div id="output"></div>

    <script src="script.js"></script>
  </body>
</html>
