<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cookies</title>
    <style>
      input,
      button {
        display: block;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Demostración de Cookies</h1>
    <p>
      Abre la consola y la pestaña "Application" o "Almacenamiento" en las
      herramientas de desarrollo para ver las cookies.
    </p>

    <label for="cookieName">Nombre de la Cookie:</label>
    <input type="text" id="cookieName" value="miDato" />
    <label for="cookieValue">Valor de la Cookie:</label>
    <input type="text" id="cookieValue" value="valorEjemplo" />
    <label for="cookieDays">Días de Expiración:</label>
    <input type="number" id="cookieDays" value="7" min="0" />
    <button onclick="setCookie()">Establecer Cookie</button>
    <button onclick="getCookie()">Obtener Todas las Cookies</button>
    <button onclick="deleteCookie()">Eliminar Cookie</button>

    <div id="output"></div>

    <script src="script.js"></script>
  </body>
</html>
