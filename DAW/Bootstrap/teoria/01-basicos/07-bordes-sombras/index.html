<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borde y Sombras</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <style>
      .container div {
        width: 200px;
        height: 200px;
        display: inline-block;
        margin: 5px;
        /* background: #f4f4f4; */
      }

      #radius div {
        background: lightslategray;
      }
    </style>

    <div class="container mt-5">
      <h1>Border</h1>
      <div class="border"></div>
      <div class="border-top"></div>
      <div class="border-bottom"></div>
      <div class="border-start"></div>
      <div class="border-end"></div>

      <div class="border-0"></div>
      <div class="border-top-0"></div>
      <div class="border-end-0"></div>
      <div class="border-bottom-0"></div>
      <div class="border-start-0"></div>

      <hr class="my-5" />

      <h1>Color</h1>
      <div class="border border-primary"></div>
      <div class="border border-secondary"></div>
      <div class="border border-success"></div>
      <div class="border border-danger"></div>
      <div class="border border-warning"></div>
      <div class="border border-info"></div>
      <div class="border border-light"></div>
      <div class="border border-dark"></div>
      <div class="border border-white"></div>

      <hr class="my-5" />
    </div>

    <div id="radius" class="container">
      <h1>Border radius</h1>
      <div class="rounded"></div>
      <div class="rounded-5"></div>
      <div class="rounded-top"></div>
      <div class="rounded-end"></div>
      <div class="rounded-bottom"></div>
      <div class="rounded-start"></div>
      <div class="rounded-circle"></div>
      <div class="rounded-pill" style="width: 350px"></div>
    </div>

    <div class="container mt-5">
      <h1>Sombra</h1>
      <div class="shadow-none p-3 mb-5 bg-light">No shadow</div>
      <div class="shadow-sm p-3 mb-5">Small shadow</div>
      <div class="shadow p-3 mb-5">Regular shadow</div>
      <div class="shadow-lg p-3 mb-5">Larger shadow</div>
    </div>
    <!-- Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
