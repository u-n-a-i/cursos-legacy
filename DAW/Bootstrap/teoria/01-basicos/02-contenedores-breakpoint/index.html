<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contenedores y Breakpoints</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container" style="background-color: lightblue">
      <p>Container</p>
    </div>

    <div class="container-sm" style="background-color: lightcoral">
      <p>SM</p>
    </div>

    <div class="container-md" style="background-color: lightsalmon">
      <p>MD</p>
    </div>

    <div class="container-lg" style="background-color: lightpink">
      <p>LG</p>
    </div>

    <div class="container-xl" style="background-color: lightgray">
      <p>XL</p>
    </div>

    <div class="container-xxl" style="background-color: lightsteelblue">
      <p>XXL</p>
    </div>

    <div class="container-fluid" style="background-color: lightslategray">
      <p>FLUID</p>
    </div>

    <!-- Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
