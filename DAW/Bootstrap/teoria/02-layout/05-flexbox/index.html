<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .d-flex {
        /* height: 300px; */
        background: #ccc;
        border: 2px solid #888;
      }

      .d-flex div {
        text-align: center;
        color: #fff;
        background: #0040ff;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.384);
      }
    </style>
    <title>Flexbox</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <!-- Tipos de flexbox -->
      <div class="d-flex p-2 bg-primary text-center my-2">
        Soy un flexbox container!
      </div>

      <div class="d-inline-flex p-2 bg-primary text-center my-2">
        Soy un inline flexbox container!
      </div>

      <hr class="my-5" />

      <!-- Direcciones en flexbox -->
      <p>Flex-row</p>
      <div class="d-flex flex-row mb-5">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
      </div>

      <p>Flex-row reverse</p>
      <div class="d-flex flex-row-reverse mb-5">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
      </div>

      <p>Flex-column</p>
      <div class="d-flex flex-column mb-5">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
      </div>

      <p>Flex-column reverse</p>
      <div class="d-flex flex-column-reverse mb-5">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
      </div>
    </div>

    <!-- Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
