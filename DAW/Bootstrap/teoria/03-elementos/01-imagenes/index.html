<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imágenes</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <style>
      .columna {
        border: 2px solid #000;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row g-0 mb-5">
        <h1>Imagen responsive & Thumbnail</h1>
        <div class="col-4">
          <img src="img/image1.jpg" class="img-fluid img-thumbnail" />
        </div>
      </div>

      <hr class="my-5" />

      <div class="row g-0 mb-5">
        <h1>Alinear imagenes</h1>
        <div class="col-6 columna">
          <img class="w-25 float-start" src="img/image2.jpg" />
          <img class="w-25 float-end" src="img/image3.jpg" />
        </div>
      </div>

      <hr class="my-5" />

      <div class="row g-0 mb-5">
        <h1>Figure</h1>
        <div class="col-4">
          <figure class="figure">
            <img
              src="img/image4.jpg"
              alt="..."
              class="figure-img img-fluid rounded"
            />
            <figcaption class="figure-caption text-end">
              A caption for the above image.
            </figcaption>
          </figure>
        </div>
      </div>
    </div>
    <!-- Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
