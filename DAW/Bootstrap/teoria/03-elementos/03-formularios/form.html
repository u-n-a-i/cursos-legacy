      <h1>Formulario En linea</h1>
      <form class="row row-cols-auto align-items-center g-3">
        <div class="col mb-3">
          <label for="exampleInputEmail1" class="form-label"
            >Email address</label
          >
          <input type="email" id="exampleInputEmail1" class="form-control" />
          <div id="emailHelp" class="form-text">
            We'll never share your email with anyone else.
          </div>
        </div>

        <div class="col mb-3">
          <label for="exampleInputPassword1" class="form-label">Password</label>
          <input
            type="password"
            id="exampleInputPassword1"
            class="form-control"
          />
        </div>

        <div class="col mb-3 form-check">
          <input type="checkbox" id="exampleCheck1" class="form-check-input" />
          <label for="exampleCheck1" class="form-check-label"
            >Check me out</label
          >
        </div>

        <div class="col">
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>
      </form>
    </div>
