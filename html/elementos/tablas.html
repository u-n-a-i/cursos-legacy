<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tablas</title>
  </head>
  <body>
    <h2>Tabla Básica</h2>
    <table border="1">
      <tr>
        <th>Nombre</th>
        <th>Edad</th>
        <th>Ciudad</th>
      </tr>
      <tr>
        <td>Alice</td>
        <td>24</td>
        <td>Madrid</td>
      </tr>
      <tr>
        <td>Bob</td>
        <td>30</td>
        <td>Barcelona</td>
      </tr>
    </table>

    <h2>Tabla - Caption</h2>
    <table border="1">
      <caption>
        Lista de Empleados
      </caption>
      <tr>
        <th>Nombre</th>
        <th>Edad</th>
        <th>Cargo</th>
      </tr>
      <tr>
        <td>Alice</td>
        <td>29</td>
        <td>Desarrolladora</td>
      </tr>
      <tr>
        <td>Bob</td>
        <td>35</td>
        <td>Diseñador</td>
      </tr>
    </table>

    <h2>Semántica</h2>
    <table border="1">
      <caption>
        Lista de Empleados
      </caption>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Edad</th>
          <th>Cargo</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Alice</td>
          <td>29</td>
          <td>Desarrolladora</td>
        </tr>
        <tr>
          <td>Bob</td>
          <td>35</td>
          <td>Diseñador</td>
        </tr>
        <tr>
          <td>Charlie</td>
          <td>40</td>
          <td>Gerente</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="3">Total de empleados: 3</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
