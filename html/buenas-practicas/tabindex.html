<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab index</title>
  </head>
  <body>
    <h1 tabindex="1">Formulario de Contacto</h1>

    <form>
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" tabindex="2" />

      <br /><br />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" tabindex="3" />

      <br /><br />

      <label for="mensaje">Mensaje:</label><br />
      <textarea
        id="mensaje"
        name="mensaje"
        rows="4"
        cols="50"
        tabindex="4"
      ></textarea>

      <br /><br />

      <button type="submit" tabindex="5">Enviar</button>
    </form>

    <p tabindex="6">Gracias por contactarnos.</p>
  </body>
</html>
